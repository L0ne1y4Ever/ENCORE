spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${ENCORE_DB_HOST:127.0.0.1}:${ENCORE_DB_PORT:3307}/${ENCORE_DB_NAME:encore}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${ENCORE_DB_USER:encore}
    password: ${ENCORE_DB_PASSWORD:encore123}
    hikari:
      initialization-fail-timeout: -1
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${ENCORE_REDIS_HOST:127.0.0.1}
      port: ${ENCORE_REDIS_PORT:6379}
      database: ${ENCORE_REDIS_DATABASE:0}
      password: ${ENCORE_REDIS_PASSWORD:}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    validate-migration-naming: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

sa-token:
  token-name: encore-token
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

encore:
  cors:
    allowed-origin-patterns: ${ENCORE_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
